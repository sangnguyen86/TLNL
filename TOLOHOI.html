<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>TỔ LÒ HƠI - QUẢN LÝ</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/livecanvas-team/ninjabootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

  <style>
    :root {
      --bg: #0a1222;
      --surface: #101827;
      --text: #e8ecf5;
      --primary: #3b82f6;
      --accent: #58a6ff;
      --border: rgba(80,120,180,0.2);
      --radius: 12px;
      --h-header: 56px;
      --h-bottom-nav: 65px;
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: 'Inter', system-ui, sans-serif; }

    /* HEADER */
    .top-header {
      height: var(--h-header);
      display: flex; align-items: center; justify-content: center;
      background: #0d1627; border-bottom: 1px solid var(--border);
      z-index: 1040; flex-shrink: 0;
    }
    .top-header h1 {
      margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 1px;
      color: var(--accent); text-shadow: 0 0 15px rgba(88,166,255,0.3);
    }

    /* KHỐI LỊCH TRỰC KÍP (THAY CHO BANNER KAIZEN) */
    .shift-banner {
      padding: 8px 12px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .shift-surface {
      background: linear-gradient(145deg, #161b22, #0d1117);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
    }
    .shift-title { font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
    .shift-info { font-size: 0.75rem; line-height: 1.4; color: #cbd5e1; }
    .shift-date-picker { 
        background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
        color: white; font-size: 0.75rem; border-radius: 5px; padding: 2px 5px;
    }

    /* MENU NGANG (PC) */
    .navbar-dark {
      margin: 0 12px 8px 12px; border-radius: 10px;
      background: #161b22 !important; border: 1px solid var(--border);
    }
    @media (max-width: 991px) { .navbar-dark { display: none; } }

    /* NỘI DUNG IFRAME */
    .content-wrapper { flex: 1; position: relative; width: 100%; background: #000; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
    iframe.active { display: block; }
    
    .fade-anim { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* BOTTOM NAV (MOBILE) */
    .bottom-nav {
      height: var(--h-bottom-nav);
      background: rgba(15, 24, 43, 0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      flex-shrink: 0;
    }
    .bn-inner { display: flex; height: 100%; align-items: center; justify-content: space-around; }
    .bn-btn {
      text-decoration: none; color: #8b949e;
      display: flex; flex-direction: column; align-items: center;
      font-size: 0.6rem; font-weight: 500; transition: 0.2s;
    }
    .bn-btn i { font-size: 1.2rem; margin-bottom: 2px; }
    .bn-btn.active { color: var(--accent); }

    @media (min-width: 992px) {
      .shift-banner { padding: 10px 100px; }
      .bottom-nav { display: none; }
    }
  </style>
</head>
<body>

<header class="top-header">
  <h1>TỔ LÒ HƠI</h1>
</header>

<div class="shift-banner">
  <div class="shift-surface">
    <div class="d-flex justify-content-between align-items-center mb-1">
        <div class="shift-title"><i class="bi bi-clock-history"></i> Lịch trực kíp</div>
        <input type="date" id="workDate" class="shift-date-picker">
    </div>
    <div id="shiftDisplay" class="shift-info">
        Đang tải dữ liệu...
    </div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark shadow d-none d-lg-block">
  <div class="container-fluid">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" data-target="mainFrame" href="#">TRANG CHỦ</a></li>
        <li class="nav-item"><a class="nav-link" data-target="taskListFrame" href="#">CÔNG VIỆC</a></li>
        <li class="nav-item"><a class="nav-link" data-target="maintListFrame" href="#">BẢO TRÌ</a></li>
        <li class="nav-item"><a class="nav-link" data-target="overTimeFrame" href="#">TĂNG CA</a></li>
        <li class="nav-item"><a class="nav-link" data-target="a100Frame" href="#">XÚT & A100</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="content-wrapper">
    <iframe id="mainFrame" src="https://script.google.com/macros/s/AKfycbylNzumSIzPj_pElw47T642qV7gv43gU8QMMX7iZU393zQK9d1-lqunu09b93jHano_/exec"></iframe>
    <iframe id="taskListFrame" src="https://script.google.com/macros/s/AKfycbw2aFX6nUXO8t_C9rueyi6GaB9FNkNmCnJygALjRqjeIdUzBduTzNIdn8pkne-BYrJCAQ/exec"></iframe>
    <iframe id="maintListFrame" src="https://script.google.com/macros/s/AKfycbxeuGMrHlOt03JdRXAeU-JBQn-hoOF0SOuX1_gH9VAGZ6dxQ8HOqnb9WGvn5ZOH1mCt9g/exec"></iframe>
    <iframe id="overTimeFrame" src="https://script.google.com/macros/s/AKfycbxGkYnnZKs2HMTbEt1O3lzRGc2_87bZZ-mwsz6hcL2238b4Ygor015r_AByx4No08AVtQ/exec"></iframe>
    <iframe id="a100Frame" src="https://script.google.com/macros/s/AKfycbxQz6qG0AtY3jUS628oCD8GSDJtT2dWG9r-Gd6alzVJY7Y1FH-atFWx90TOgGRqLDYJ/exec"></iframe>
</div>

<nav class="bottom-nav d-lg-none">
  <div class="bn-inner">
    <a href="#" class="bn-btn active" data-target="mainFrame"><i class="bi bi-house"></i><div>Trang chủ</div></a>
    <a href="#" class="bn-btn" data-target="taskListFrame"><i class="bi bi-list-check"></i><div>Công việc</div></a>
    <a href="#" class="bn-btn" data-target="maintListFrame"><i class="bi bi-tools"></i><div>Bảo trì</div></a>
    <a href="#" class="bn-btn" data-target="overTimeFrame"><i class="bi bi-alarm"></i><div>Tăng ca</div></a>
    <a href="#" class="bn-btn" data-target="a100Frame"><i class="bi bi-droplet-half"></i><div>Xút/A100</div></a>
  </div>
</nav>

<script>
  // --- PHẦN 1: LOGIC ĐIỀU KHIỂN GIAO DIỆN ---
  document.querySelectorAll('[data-target]').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('data-target');
      
      document.querySelectorAll('iframe').forEach(iframe => iframe.classList.remove('active', 'fade-anim'));
      const activeFrame = document.getElementById(targetId);
      activeFrame.classList.add('active', 'fade-anim');
      
      document.querySelectorAll('[data-target]').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll(`[data-target="${targetId}"]`).forEach(btn => btn.classList.add('active'));
      
      localStorage.setItem('lastFrameBoiler', targetId);
    });
  });

  // --- PHẦN 2: LOGIC TÍNH TOÁN KÍP/CA (GIỮ NGUYÊN TỪ BẢN CŨ) ---
  const baseDate = new Date("2025-01-01");
  const groupA = ["Mạnh Hiền","Quốc Thắng"], groupB = ["Cường Thịnh","Minh Tú"], groupC = ["Đức Thịnh","Ngọc Hiếu"];
  const kipOrder = [groupA, groupB, groupC], caOrder = [["Ca A"], ["Ca B"]];
  const baseKip = [groupB, groupC, groupA], baseCa = [["Ca B"], ["Ca A"]];

  function startOfWeekMonday(date) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    let day = d.getDay();
    if (day === 0) day = 7;
    d.setDate(d.getDate() - (day - 1));
    return d;
  }

  function computeShifts(d) {
    const monday = startOfWeekMonday(d);
    const k = Math.floor((monday - startOfWeekMonday(baseDate)) / (7 * 24 * 60 * 60 * 1000));
    
    const getRotate = (base, order, steps) => order[(order.indexOf(base) + steps) % order.length];
    
    return {
      k1: getRotate(baseKip[0], kipOrder, k).join(", "),
      k2: getRotate(baseKip[1], kipOrder, k).join(", "),
      k3: getRotate(baseKip[2], kipOrder, k).join(", "),
      caS: getRotate(baseCa[0], caOrder, k),
      caC: getRotate(baseCa[1], caOrder, k)
    };
  }

  function updateDisplay(date) {
    const s = computeShifts(date);
    document.getElementById('shiftDisplay').innerHTML = `
        <b>Kíp 1:</b> ${s.k1} | <b>Kíp 2:</b> ${s.k2} | <b>Kíp 3:</b> ${s.k3}<br>
        <span style="color:var(--accent)"><b>Sáng:</b> ${s.caS} — <b>Chiều:</b> ${s.caC}</span>
    `;
  }

  // Khởi tạo khi load trang
  window.onload = () => {
    // Phục hồi iframe cũ
    const saved = localStorage.getItem('lastFrameBoiler') || 'mainFrame';
    const link = document.querySelector(`[data-target="${saved}"]`);
    if(link) link.click();

    // Thiết lập ngày mặc định và tính kíp
    const today = new Date();
    document.getElementById('workDate').value = today.toISOString().split('T')[0];
    updateDisplay(today);
  };

  document.getElementById('workDate').addEventListener('change', (e) => {
    updateDisplay(new Date(e.target.value));
  });
</script>
</body>
</html>
