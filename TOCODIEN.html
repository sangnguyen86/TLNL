<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>TỔ CƠ ĐIỆN</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/livecanvas-team/ninjabootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

  <style>
    :root {
      --bg: #0a1222;
      --surface: #101827;
      --text: #e8ecf5;
      --primary: #3b82f6;
      --accent: #58a6ff;
      --border: rgba(80,120,180,0.2);
      --radius: 12px;
      
      /* Chiều cao cố định */
      --h-header: 56px;
      --h-banner: 80px;
      --h-bottom-nav: 65px;
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: 'Inter', system-ui, sans-serif; }

    /* HEADER */
    .top-header {
      height: var(--h-header);
      display: flex; align-items: center; justify-content: center;
      background: #0d1627; border-bottom: 1px solid var(--border);
      z-index: 1040; flex-shrink: 0;
    }
    .top-header h1 {
      margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 1px;
      color: var(--accent); text-shadow: 0 0 15px rgba(88,166,255,0.3);
    }

    /* BANNER KAIZEN - Tối ưu thu nhỏ trên Mobile */
    .kaizen-banner {
      padding: 8px 12px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .kb-surface {
      background: linear-gradient(145deg, #161b22, #0d1117);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px; text-align: center;
      position: relative; overflow: hidden;
    }
    .kb-title-1 { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
    .kb-title-2 { font-size: 0.65rem; opacity: 0.8; }
    .kb-5s { font-size: 0.55rem; color: #8b949e; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* MENU NGANG (PC) */
    .navbar-dark {
      margin: 0 12px 8px 12px; border-radius: 10px;
      background: #161b22 !important; border: 1px solid var(--border);
    }
    @media (max-width: 991px) { .navbar-dark { display: none; } } /* Ẩn menu top trên mobile */

    /* NỘI DUNG IFRAME - Chiếm toàn bộ không gian còn lại */
    .content-wrapper {
      flex: 1; position: relative; width: 100%;
      background: #000; /* Nền đen để tránh lộ khoảng trắng khi load */
    }
    iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: none; display: none;
    }
    iframe.active { display: block; }
    
    /* Hiệu ứng chuyển cảnh */
    .fade-anim { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* BOTTOM NAV (MOBILE) - Style hiện đại */
    .bottom-nav {
      height: var(--h-bottom-nav);
      background: rgba(15, 24, 43, 0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom); /* Hỗ trợ iPhone đời mới */
      flex-shrink: 0;
    }
    .bn-inner { display: flex; height: 100%; align-items: center; justify-content: space-around; }
    .bn-btn {
      text-decoration: none; color: #8b949e;
      display: flex; flex-direction: column; align-items: center;
      font-size: 0.65rem; font-weight: 500; transition: 0.2s;
    }
    .bn-btn i { font-size: 1.3rem; margin-bottom: 2px; }
    .bn-btn.active { color: var(--accent); transform: translateY(-2px); }
    .bn-btn.active i { filter: drop-shadow(0 0 5px var(--accent)); }

    /* PC ADJUSTMENTS */
    @media (min-width: 992px) {
      .kaizen-banner { padding: 15px 100px; }
      .kb-title-1 { font-size: 1.1rem; }
      .kb-title-2 { font-size: 0.9rem; }
      .bottom-nav { display: none; }
    }
  </style>
</head>
<body>

<header class="top-header">
  <h1>TỔ CƠ ĐIỆN</h1>
</header>

<div class="kaizen-banner">
  <div class="kb-surface">
    <div class="kb-title-1">CHỦ ĐỘNG ✦ SÁNG TẠO ✦ HIỆU QUẢ</div>
    <div class="kb-title-2">KAIZEN - KHÔNG NGỪNG CẢI TIẾN</div>
    <div class="kb-5s">Sàng lọc • Sắp xếp • Sạch sẽ • Săn sóc • Sẵn sàng</div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark shadow d-none d-lg-block">
  <div class="container-fluid">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" data-target="taskListFrame" href="#">BẢNG CÔNG VIỆC</a></li>
        <li class="nav-item"><a class="nav-link" data-target="planListFrame" href="#">DỰ KIẾN</a></li>
        <li class="nav-item"><a class="nav-link" data-target="maintListFrame" href="#">BẢO DƯỠNG</a></li>
        <li class="nav-item"><a class="nav-link" data-target="TaskReportFrame" href="#">BÁO CÁO</a></li>
        <li class="nav-item"><a class="nav-link" data-target="chamcongFrame" href="#">CHẤM CÔNG</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="content-wrapper">
    <iframe id="taskListFrame" src="https://script.google.com/macros/s/AKfycbyhkBhsbFxcdjDmk4m01T9sxWOrAUGeSCYsmVvUHczsoE6MhqTHPsgDDLikbnW2liXVvA/exec"></iframe>
    <iframe id="planListFrame" src="https://script.google.com/macros/s/AKfycby6kstI0YU3rdAR7txXXudD_83JET2x7AzFzufPdOmxuz4xS0M35tsGn4i1z9CGXA-C/exec"></iframe>
    <iframe id="maintListFrame" src="https://script.google.com/macros/s/AKfycbxeuGMrHlOt03JdRXAeU-JBQn-hoOF0SOuX1_gH9VAGZ6dxQ8HOqnb9WGvn5ZOH1mCt9g/exec"></iframe>
    <iframe id="TaskReportFrame" src="https://script.google.com/macros/s/AKfycbzwCj7p9fYzDMmeoEMnmdSmG__XTMAdEoBi17GLPR-r5gPXpoiypiK7GVdK3yodP0iT/exec"></iframe>
    <iframe id="chamcongFrame" src="https://script.google.com/macros/s/AKfycbxG7IU2Nvv4IFmmcZnu4N_SWaNAKRYnNzElRan5ZiAaNqjb2GRdRpg-yyYCIZ95Gc6y2w/exec"></iframe>
</div>

<nav class="bottom-nav d-lg-none">
  <div class="bn-inner">
    <a href="#" class="bn-btn active" data-target="taskListFrame"><i class="bi bi-card-checklist"></i><div>Công việc</div></a>
    <a href="#" class="bn-btn" data-target="planListFrame"><i class="bi bi-calendar-event"></i><div>Dự kiến</div></a>
    <a href="#" class="bn-btn" data-target="maintListFrame"><i class="bi bi-gear-wide-connected"></i><div>Bảo dưỡng</div></a>
    <a href="#" class="bn-btn" data-target="TaskReportFrame"><i class="bi bi-bar-chart-line"></i><div>Báo cáo</div></a>
    <a href="#" class="bn-btn" data-target="chamcongFrame"><i class="bi bi-person-check"></i><div>Chấm công</div></a>
  </div>
</nav>

<script>
  document.querySelectorAll('[data-target]').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('data-target');
      
      // Ẩn tất cả iframe
      document.querySelectorAll('iframe').forEach(iframe => {
        iframe.classList.remove('active', 'fade-anim');
      });
      
      // Hiện iframe mục tiêu
      const activeFrame = document.getElementById(targetId);
      activeFrame.classList.add('active', 'fade-anim');
      
      // Cập nhật trạng thái nút bấm
      document.querySelectorAll('[data-target]').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll(`[data-target="${targetId}"]`).forEach(btn => btn.classList.add('active'));
      
      localStorage.setItem('lastFrame', targetId);
    });
  });

  // Khôi phục trang cuối cùng
  window.onload = () => {
    const saved = localStorage.getItem('lastFrame') || 'taskListFrame';
    const link = document.querySelector(`[data-target="${saved}"]`);
    if(link) link.click();
  };
</script>
</body>
</html>
